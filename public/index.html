<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wedding Photobooth 💒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(135deg, #fdf6f0 0%, #f5e6d3 50%, #fdf6f0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #4a3728;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 20px 16px 10px;
      width: 100%;
    }
    .header h1 {
      font-size: 1.6em;
      font-weight: 400;
      color: #8b6914;
      letter-spacing: 2px;
    }
    .header .hashtag {
      font-size: 0.85em;
      color: #b8960c;
      margin-top: 4px;
      font-style: italic;
    }

    /* ── Camera Area ── */
    .camera-container {
      position: relative;
      width: min(90vw, 400px);
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      margin: 10px 0;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror for selfie */
    }
    #canvas { display: none; }

    /* ── Frame Overlay ── */
    .frame-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .frame-overlay img {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    /* ── Countdown ── */
    .countdown {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .countdown.active { opacity: 1; }
    .countdown-number {
      font-size: 6em;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: pulse 0.8s ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1.5); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.8; }
    }

    /* ── Flash ── */
    .flash {
      position: absolute;
      inset: 0;
      background: white;
      z-index: 15;
      opacity: 0;
      pointer-events: none;
    }
    .flash.active {
      animation: flashAnim 0.4s ease-out;
    }
    @keyframes flashAnim {
      0% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      width: 100%;
    }

    .btn {
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.92); }

    .btn-capture {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #d4a853, #b8960c);
      box-shadow: 0 4px 16px rgba(184,150,12,0.4);
      font-size: 28px;
    }

    .btn-switch {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.8);
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn-frame {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.8);
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* ── Name Input ── */
    .name-input-area {
      width: min(90vw, 400px);
      padding: 8px 0;
    }
    .name-input-area input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e8d5b8;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255,255,255,0.7);
      color: #4a3728;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input-area input:focus { border-color: #d4a853; }
    .name-input-area input::placeholder { color: #b8a088; }

    /* ── Preview ── */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .preview-overlay.active { display: flex; }

    .preview-image {
      max-width: min(85vw, 360px);
      max-height: 65vh;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .preview-actions {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .preview-btn {
      padding: 12px 32px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .preview-btn:active { transform: scale(0.95); }
    .preview-btn.retake {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .preview-btn.upload {
      background: linear-gradient(135deg, #d4a853, #b8960c);
      color: white;
      font-weight: 600;
    }

    /* ── Success ── */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }
    .success-overlay.active { display: flex; }
    .success-emoji { font-size: 4em; margin-bottom: 16px; }
    .success-text { font-size: 1.3em; margin-bottom: 8px; }
    .success-sub { font-size: 0.9em; color: #ccc; margin-bottom: 24px; }
    .success-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #d4a853, #b8960c);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Gallery Link ── */
    .gallery-link {
      padding: 12px 16px;
      text-align: center;
    }
    .gallery-link a {
      color: #8b6914;
      text-decoration: none;
      font-size: 0.9em;
      border-bottom: 1px dashed #d4a853;
      padding-bottom: 2px;
    }

    /* ── Loading spinner ── */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Frame selector ── */
    .frame-selector {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      padding: 12px;
      z-index: 5;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .frame-selector.active { display: block; }
    .frame-option {
      display: inline-block;
      width: 60px;
      height: 80px;
      margin: 0 4px;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 10px;
      text-align: center;
      line-height: 80px;
      vertical-align: middle;
    }
    .frame-option.active { border-color: #d4a853; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 id="coupleNames">Wedding Photobooth</h1>
    <div class="hashtag" id="hashtag">#Wedding2026</div>
  </div>

  <!-- Camera -->
  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- Frame overlay -->
    <div class="frame-overlay" id="frameOverlay"></div>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
      <div class="countdown-number" id="countdownNum">3</div>
    </div>

    <!-- Flash -->
    <div class="flash" id="flash"></div>

    <!-- Frame selector -->
    <div class="frame-selector" id="frameSelector">
      <div class="frame-option active" data-frame="none">None</div>
      <div class="frame-option" data-frame="gold">Gold ✨</div>
      <div class="frame-option" data-frame="floral">Floral 🌸</div>
      <div class="frame-option" data-frame="hearts">Hearts 💕</div>
      <div class="frame-option" data-frame="classic">Classic 🖼️</div>
    </div>
  </div>

  <!-- Name input -->
  <div class="name-input-area">
    <input type="text" id="guestName" placeholder="Netrust Employee" maxlength="30" autocomplete="off">
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-switch" id="switchBtn" title="Switch camera">🔄</button>
    <button class="btn btn-capture" id="captureBtn" title="Take photo">📸</button>
    <button class="btn btn-frame" id="frameBtn" title="Choose frame">🖼️</button>
  </div>

  <!-- Gallery link -->
  <div class="gallery-link">
    <a href="/photobooth/gallery.html">🖼️ View all photos →</a>
  </div>

  <!-- Preview overlay -->
  <div class="preview-overlay" id="previewOverlay">
    <img class="preview-image" id="previewImage" alt="Preview">
    <div class="preview-actions">
      <button class="preview-btn retake" id="retakeBtn">Retake</button>
      <button class="preview-btn upload" id="uploadBtn">Upload 💍</button>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-emoji">🎉</div>
    <div class="success-text">Photo uploaded!</div>
    <div class="success-sub">Thank you for celebrating with us 💍</div>
    <button class="success-btn" id="againBtn">Take another</button>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────
    let stream = null;
    let facingMode = 'user'; // front camera by default
    let currentFrame = 'none';
    let capturedBlob = null;

    // ── Elements ───────────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const countdownEl = document.getElementById('countdown');
    const countdownNum = document.getElementById('countdownNum');
    const flashEl = document.getElementById('flash');
    const previewOverlay = document.getElementById('previewOverlay');
    const previewImage = document.getElementById('previewImage');
    const successOverlay = document.getElementById('successOverlay');
    const frameOverlay = document.getElementById('frameOverlay');
    const frameSelector = document.getElementById('frameSelector');

    // ── Load config ────────────────────────────────────────────
    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        document.getElementById('coupleNames').textContent = cfg.coupleNames || 'Wedding Photobooth';
        document.getElementById('hashtag').textContent = cfg.hashtag || '';
        document.title = `${cfg.coupleNames} Photobooth 💒`;
      });

    // ── Camera ─────────────────────────────────────────────────
    async function startCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1080 }, height: { ideal: 1440 } },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert('Camera access denied. Please allow camera access to use the photobooth.');
      }
    }
    startCamera();

    // Switch camera
    document.getElementById('switchBtn').addEventListener('click', () => {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      startCamera();
    });

    // ── Frame selection ────────────────────────────────────────
    document.getElementById('frameBtn').addEventListener('click', () => {
      frameSelector.classList.toggle('active');
    });

    document.querySelectorAll('.frame-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.frame-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        currentFrame = opt.dataset.frame;
        updateFrame();
        frameSelector.classList.remove('active');
      });
    });

    function updateFrame() {
      if (currentFrame === 'none') {
        frameOverlay.innerHTML = '';
        return;
      }
      // CSS-based frames (no external images needed)
      const frames = {
        gold: `<div style="position:absolute;inset:0;border:12px solid transparent;border-image:linear-gradient(135deg,#d4a853,#f0d78c,#d4a853) 1;pointer-events:none;"></div>
               <div style="position:absolute;top:12px;left:12px;right:12px;text-align:center;color:#d4a853;font-size:14px;font-family:Georgia;text-shadow:0 1px 3px rgba(0,0,0,0.5);">✨ 💍 ✨</div>`,
        floral: `<div style="position:absolute;inset:0;border:8px solid transparent;border-image:linear-gradient(45deg,#f8a4c8,#f0d78c,#a8d8ea) 1;pointer-events:none;"></div>
                 <div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,0.3);">🌸🌷🌸</div>`,
        hearts: `<div style="position:absolute;top:8px;left:0;right:0;text-align:center;font-size:24px;text-shadow:0 2px 6px rgba(0,0,0,0.3);">💕 💕 💕</div>
                 <div style="position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:24px;text-shadow:0 2px 6px rgba(0,0,0,0.3);">💕 💕 💕</div>`,
        classic: `<div style="position:absolute;inset:0;border:16px solid rgba(255,255,255,0.85);box-shadow:inset 0 0 0 3px #d4a853;pointer-events:none;border-radius:4px;"></div>`
      };
      frameOverlay.innerHTML = frames[currentFrame] || '';
    }

    // ── Capture with countdown ─────────────────────────────────
    document.getElementById('captureBtn').addEventListener('click', () => {
      let count = 3;
      countdownNum.textContent = count;
      countdownEl.classList.add('active');

      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          countdownNum.textContent = count;
          // re-trigger animation
          countdownNum.style.animation = 'none';
          void countdownNum.offsetWidth;
          countdownNum.style.animation = 'pulse 0.8s ease-in-out';
        } else {
          clearInterval(interval);
          countdownNum.textContent = '📸';
          setTimeout(() => {
            countdownEl.classList.remove('active');
            capturePhoto();
          }, 300);
        }
      }, 900);
    });

    function capturePhoto() {
      // Flash effect
      flashEl.classList.add('active');
      setTimeout(() => flashEl.classList.remove('active'), 400);

      // Capture to canvas
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');

      // Mirror for selfie camera
      if (facingMode === 'user') {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, 0, 0);

      // Reset transform so frame/text draws un-mirrored
      ctx.setTransform(1, 0, 0, 1, 0, 0);

      // Draw frame on canvas (for the saved photo)
      drawFrameOnCanvas(ctx, canvas.width, canvas.height);

      // Draw guest name + hashtag
      drawTextOverlay(ctx, canvas.width, canvas.height);

      // Convert to blob
      canvas.toBlob(blob => {
        capturedBlob = blob;
        previewImage.src = URL.createObjectURL(blob);
        previewOverlay.classList.add('active');
      }, 'image/jpeg', 0.92);
    }

    function drawFrameOnCanvas(ctx, w, h) {
      if (currentFrame === 'none') return;

      ctx.save();

      if (currentFrame === 'gold') {
        ctx.strokeStyle = '#d4a853';
        ctx.lineWidth = Math.min(w, h) * 0.03;
        ctx.strokeRect(ctx.lineWidth/2, ctx.lineWidth/2, w - ctx.lineWidth, h - ctx.lineWidth);
        ctx.font = `${Math.min(w,h)*0.04}px Georgia`;
        ctx.fillStyle = '#d4a853';
        ctx.textAlign = 'center';
        ctx.fillText('✨ 💍 ✨', w/2, h*0.05);
      } else if (currentFrame === 'classic') {
        const bw = Math.min(w, h) * 0.04;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(0, 0, w, bw);
        ctx.fillRect(0, h-bw, w, bw);
        ctx.fillRect(0, 0, bw, h);
        ctx.fillRect(w-bw, 0, bw, h);
        ctx.strokeStyle = '#d4a853';
        ctx.lineWidth = 3;
        ctx.strokeRect(bw, bw, w-bw*2, h-bw*2);
      } else if (currentFrame === 'hearts') {
        ctx.font = `${Math.min(w,h)*0.06}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('💕 💕 💕', w/2, h*0.06);
        ctx.fillText('💕 💕 💕', w/2, h*0.96);
      } else if (currentFrame === 'floral') {
        ctx.font = `${Math.min(w,h)*0.07}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('🌸 🌷 🌸', w/2, h*0.96);
      }
      ctx.restore();
    }

    function drawTextOverlay(ctx, w, h) {
      ctx.save();
      const fontSize = Math.min(w, h) * 0.05;
      const padding = Math.min(w, h) * 0.03;

      // Semi-transparent banner backgrounds
      const bannerH = fontSize * 2.2;

      // ── Top banner: Guest name ──
      const guestName = document.getElementById('guestName').value.trim() || 'Netrust Employee';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, w, bannerH);
      ctx.font = `bold ${fontSize}px Georgia, serif`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 4;
      ctx.fillText(guestName, w / 2, bannerH / 2);

      // ── Bottom banner: Hashtag ──
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, h - bannerH, w, bannerH);
      ctx.font = `bold ${fontSize * 0.85}px Georgia, serif`;
      ctx.fillStyle = '#d4a853';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 4;
      ctx.fillText('#NetrustXmasParty2026', w / 2, h - bannerH / 2);

      ctx.restore();
    }

    // ── Retake ─────────────────────────────────────────────────
    document.getElementById('retakeBtn').addEventListener('click', () => {
      previewOverlay.classList.remove('active');
      capturedBlob = null;
    });

    // ── Upload ─────────────────────────────────────────────────
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      if (!capturedBlob) return;

      const btn = document.getElementById('uploadBtn');
      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled = true;

      const formData = new FormData();
      formData.append('photo', capturedBlob, 'photo.jpg');
      formData.append('guestName', document.getElementById('guestName').value || 'guest');

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
          previewOverlay.classList.remove('active');
          successOverlay.classList.add('active');
        } else {
          alert('Upload failed. Please try again.');
        }
      } catch (err) {
        alert('Upload failed. Check your connection and try again.');
      }

      btn.innerHTML = 'Upload 💍';
      btn.disabled = false;
    });

    // ── Take another ───────────────────────────────────────────
    document.getElementById('againBtn').addEventListener('click', () => {
      successOverlay.classList.remove('active');
      capturedBlob = null;
    });
  </script>
</body>
</html>
