<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Enter PIN — Wedding Photobooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(135deg, #fdf6f0 0%, #f5e6d3 50%, #fdf6f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a3728;
    }
    .login-box {
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      width: min(90vw, 360px);
    }
    .login-box .emoji { font-size: 3em; margin-bottom: 12px; }
    .login-box h1 {
      font-size: 1.4em;
      font-weight: 400;
      color: #8b6914;
      margin-bottom: 6px;
    }
    .login-box p {
      font-size: 0.9em;
      color: #b8a088;
      margin-bottom: 24px;
    }
    .pin-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e8d5b8;
      border-radius: 12px;
      font-size: 1.4em;
      text-align: center;
      letter-spacing: 8px;
      font-family: inherit;
      background: rgba(255,255,255,0.7);
      color: #4a3728;
      outline: none;
      transition: border-color 0.2s;
    }
    .pin-input:focus { border-color: #d4a853; }
    .pin-input::placeholder { letter-spacing: 2px; font-size: 0.7em; color: #b8a088; }
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: 30px;
      font-size: 1.1em;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #d4a853, #b8960c);
      color: white;
      font-weight: 600;
      transition: transform 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .error {
      color: #c0392b;
      font-size: 0.85em;
      margin-top: 12px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="emoji">🔒</div>
    <h1>Welcome</h1>
    <p>Enter the PIN to access the photobooth</p>
    <form id="pinForm">
      <input type="password" class="pin-input" id="pinInput" placeholder="Enter PIN" inputmode="numeric" autocomplete="off" autofocus>
      <button type="submit" class="btn">Enter</button>
    </form>
    <div class="error" id="error">Incorrect PIN. Please try again.</div>
    <p style="margin-top:16px;font-size:0.85em;"><a href="/" style="color:#b8a088;text-decoration:none;">← Back to Hub</a></p>
  </div>
  <script>
    document.getElementById('pinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pin = document.getElementById('pinInput').value;
      try {
        const res = await fetch('/api/verify-pin/photobooth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/photobooth/';
        } else {
          document.getElementById('error').classList.add('show');
          document.getElementById('pinInput').value = '';
          document.getElementById('pinInput').focus();
        }
      } catch (err) {
        document.getElementById('error').textContent = 'Connection error. Try again.';
        document.getElementById('error').classList.add('show');
      }
    });
  </script>
</body>
</html>
