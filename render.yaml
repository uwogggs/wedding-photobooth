services:
  - type: web
    name: wedding-photobooth
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PHOTOBOOTH_PIN
        value: "111283"
      - key: KANBAN_PIN
        value: "680283"
      - key: SESSION_SECRET
        value: "jonathan-hub-2026-static-secret"
      - key: SYNC_API_KEY
        value: "hermes-sync-2026-secure-key"
      - key: NODE_ENV
        value: production
